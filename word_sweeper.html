<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordSweeper</title>
    <style>
        :root {
            --color-bg: #121213;
            --color-tile-bg: #121213;
            --color-border: #3a3a3c;
            --color-text: #ffffff;
            --color-grey: #3a3a3c;
            --color-yellow: #b59f3b;
            --color-green: #538d4e;
            --color-mine: #e04141;
            --color-flag: #ff9f43;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        header {
            border-bottom: 1px solid var(--color-border);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: 0.1rem;
        }

        #stats-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 350px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #818384;
        }

        /* 5x5 Grid Styling */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1;
            margin-bottom: 20px;
        }

        .tile {
            background-color: var(--color-tile-bg);
            border: 2px solid var(--color-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .tile .count {
            font-size: 0.75rem;
            position: absolute;
            bottom: 2px;
            right: 4px;
            opacity: 0.8;
        }

        /* State Colors */
        .tile.revealed-grey {
            background-color: var(--color-grey);
            border-color: var(--color-grey);
        }

        .tile.revealed-yellow {
            background-color: var(--color-yellow);
            border-color: var(--color-yellow);
        }

        .tile.flagged {
            border-color: var(--color-flag);
            background-color: #2c2519;
        }

        .tile.flagged::before {
            content: "🚩";
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.8rem;
        }

        .tile.mine-exploded {
            background-color: var(--color-mine);
            border-color: var(--color-mine);
        }

        .tile.victory-green {
            background-color: var(--color-green);
            border-color: var(--color-green);
            transform: scale(1);
        }

        /* Controls & Action Buttons */
        #controls {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            background-color: #818384;
            color: white;
            border: none;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button.active-mode {
            background-color: var(--color-flag);
        }

        #submit-btn {
            background-color: var(--color-green);
        }

        #message {
            font-weight: bold;
            height: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Floating Overlay Pop-up Modal Styling */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #modal-content {
            background-color: #1e1e20;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #modal-restart-btn {
            background-color: var(--color-green);
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .credit-text {
            font-size: 0.85rem;
            color: #818384;
            letter-spacing: 0.05rem;
            margin: 0;
        }

        #reveal-word-box {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffffff;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>WORDSWEEPER</h1>
    </header>

    <div id="stats-container">
        <div id="flags-count">FLAGS NEEDED: 0</div>
        <div id="status-msg">FIND THE SECRET WORD</div>
    </div>

    <div id="message"></div>

    <div id="grid"></div>

    <div id="controls">
        <button id="mode-btn" onclick="toggleMode()">Mode: Dig ⛏️</button>
        <button id="submit-btn" onclick="checkWinCondition()">Submit Word 🟢</button>
    </div>

    <!-- Floating Pop-up Modal Box -->
    <div id="modal-overlay">
        <div id="modal-content">
            <div id="reveal-word-box"></div>
            <button id="modal-restart-btn" onclick="initGame()"> Play Again </button>
            <div class="credit-text">Made by TeaAndPython</div>
        </div>
    </div>

        "FLUX", "FLYING", "FOAMY", "FOCUS", "FODDER", "FOIBLE", "FOIL", "FOIST", "FOLDER", 
        "FOLIO", "FOLLY", "FOMENT", "FONDLE", "FORAGE", "FORCE", "FORECAST", "FOREIGN", "FOREMAN", 
        "FOREST", "FOREVER", "FORFEIT", "FORGAVE", "FORGE", "FORGET", "FORGIVE", "FORGO", "FORK", 
        "FORMAL", "FORMAT", "FORMER", "FORUM", "FORWARD", "FOSSIL", "FOSTER", "FOUGHT", "FOUND", 
        "FOUNT", "FOYER", "FRAIL", "FRAME", "FRANC", "FRANK", "FRAUD", "FRAY", "FREAK", 
        "FREEDOM", "FREEZE", "FRENCH", "FRENZY", "FRESCO", "FRESH", "FRETFUL", "FRIAR", "FRIDAY", 
        "FRIEND", "FRIEZE", "FRIGID", "FRINGE", "FRISK", "FRISKY", "FRITTER", "FRIZZ", "FROCK", 
        "FROLIC", "FROND", "FRONT", "FROST", "FROSTY", "FROTH", "FROWZY", "FROZEN", "FRUGAL", 
        "FRUIT", "FUCHSIA", "FUDGE", "FUGITIVE", "FULCRUM", "FULFILL", "FULLER", "FULLY", 
        "FUMBLE", "FUMIGATE", "FUNCTION", "FUNERAL", "FUNNY", "FURBISH", "FURIOUS", "FURLONG", 
        "FURROW", "FURRY", "FURTHER", "FURTIVE", "FUTURE", "FUZZY"
    ];

    const GRID_SIZE = 5;
    const FULL_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

    let SECRET_WORD = "";
    let UNIQUE_WORD_LETTERS = []; 
    let board = [];
    let isFlagMode = false;
    let gameOver = false;
    let flaggedCount = 0;

    const gridElement = document.getElementById('grid');
    const messageElement = document.getElementById('message');
    const flagsCountElement = document.getElementById('flags-count');
    const modeBtn = document.getElementById('mode-btn');
    const modalOverlay = document.getElementById('modal-overlay');
    const revealWordBox = document.getElementById('reveal-word-box');

    function initGame() {
        gameOver = false;
        isFlagMode = false;
        flaggedCount = 0;
        board = [];
        
        modalOverlay.style.display = "none";

        SECRET_WORD = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
        UNIQUE_WORD_LETTERS = [...new Set(SECRET_WORD.split(''))];

        messageElement.innerText = "";
        flagsCountElement.innerText = `FLAGS NEEDED: ${UNIQUE_WORD_LETTERS.length}`;
        document.getElementById('status-msg').innerText = "FIND THE SECRET WORD";
        modeBtn.innerText = "Mode: Dig ⛏️";
        modeBtn.classList.remove('active-mode');

        let availableLetters = FULL_ALPHABET.filter(letter => !UNIQUE_WORD_LETTERS.includes(letter));
        
        for (let i = availableLetters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [availableLetters[i], availableLetters[j]] = [availableLetters[j], availableLetters[i]];
        }

        let neededFillerSize = (GRID_SIZE * GRID_SIZE) - UNIQUE_WORD_LETTERS.length;
        let finalFiller = availableLetters.slice(0, neededFillerSize);
        
        let allTiles = [...UNIQUE_WORD_LETTERS, ...finalFiller];
        
        for (let i = allTiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allTiles[i], allTiles[j]] = [allTiles[j], allTiles[i]];
        }

        let index = 0;
        for (let r = 0; r < GRID_SIZE; r++) {
            board[r] = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                let letter = allTiles[index++];
                board[r][c] = {
                    row: r,
                    col: c,
                    letter: letter,
                    isMine: UNIQUE_WORD_LETTERS.includes(letter),
                    isRevealed: false,
                    isFlagged: false,
                    neighborMines: 0,
                    element: null
                };
            }
        }

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (!board[r][c].isMine) {
                    board[r][c].neighborMines = countAdjacentMines(r, c);
                }
            }
        }

        renderBoard();
    }

    function countAdjacentMines(r, c) {
        let count = 0;
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                let newR = r + i;
                let newC = c + j;
                if (newR >= 0 && newR < GRID_SIZE && newC >= 0 && newC < GRID_SIZE) {
                    if (board[newR][newC].isMine) count++;
                }
            }
        }
        return count;
    }

    function renderBoard() {
        gridElement.innerHTML = '';
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const tile = board[r][c];
                const tileEl = document.createElement('div');
                tileEl.classList.add('tile');
                tileEl.innerText = tile.letter;
                
                // Left click handler
                tileEl.addEventListener('click', () => handleTileClick(r, c, false));
                
                // Right click handler
                tileEl.addEventListener('contextmenu', (e) => {
                    e.preventDefault(); // Turn off standard browser right-click menu
                    handleTileClick(r, c, true);
                });
                
                tile.element = tileEl;
                gridElement.appendChild(tileEl);
            }
        }
    }

    function toggleMode() {
        if (gameOver) return;
        isFlagMode = !isFlagMode;
        if (isFlagMode) {
            modeBtn.innerText = "Mode: Flag 🚩";
            modeBtn.classList.add('active-mode');
        } else {
            modeBtn.innerText = "Mode: Dig ⛏️";
            modeBtn.classList.remove('active-mode');
        }
    }

    function handleTileClick(r, c, forceFlag) {
        if (gameOver) return;
        let tile = board[r][c];

        // Process as flag toggle if either in Flag mode OR triggered by right-click (forceFlag)
        if (isFlagMode || forceFlag) {
            if (tile.isRevealed) return;
            
            if (tile.isFlagged) {
                tile.isFlagged = false;
                tile.element.classList.remove('flagged');
                flaggedCount--;
            } else {
                if (flaggedCount >= UNIQUE_WORD_LETTERS.length) {
                    showMessage(`You only need to flag ${UNIQUE_WORD_LETTERS.length} unique letters!`);
                    return;
                }
                tile.isFlagged = true;
                tile.element.classList.add('flagged');
                flaggedCount++;
            }
            flagsCountElement.innerText = `FLAGS PLACED: ${flaggedCount} / ${UNIQUE_WORD_LETTERS.length}`;
        } else {
            // Normal left-click digestion processing
            if (tile.isRevealed || tile.isFlagged) return;

            if (tile.isMine) {
                tile.isRevealed = true;
                tile.element.classList.add('mine-exploded');
                endGame(false, `BOOM! You clicked '${tile.letter}', which is part of the word.`);
                return;
            }

            revealTile(r, c);
        }
    }

    function revealTile(r, c) {
        let tile = board[r][c];
        if (tile.isRevealed || tile.isFlagged || tile.isMine) return;

        tile.isRevealed = true;

        if (tile.neighborMines > 0) {
            tile.element.classList.add('revealed-yellow');
            
            let countEl = document.createElement('span');
            countEl.classList.add('count');
            countEl.innerText = tile.neighborMines;
            tile.element.appendChild(countEl);
        } else {
            tile.element.classList.add('revealed-grey');
            
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    let newR = r + i;
                    let newC = c + j;
                    if (newR >= 0 && newR < GRID_SIZE && newC >= 0 && newC < GRID_SIZE) {
                        revealTile(newR, newC);
                    }
                }
            }
        }
    }

    function checkWinCondition() {
        if (gameOver) return;

        let correctlyFlagged = 0;
        let totalFlagsPlaced = 0;

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (board[r][c].isFlagged) {
                    totalFlagsPlaced++;
                    if (board[r][c].isMine) {
                        correctlyFlagged++;
                    }
                }
            }
        }

        if (totalFlagsPlaced !== UNIQUE_WORD_LETTERS.length) {
            showMessage(`You must flag exactly ${UNIQUE_WORD_LETTERS.length} letters before submitting!`);
            return;
        }

        if (correctlyFlagged === UNIQUE_WORD_LETTERS.length) {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c].isMine) {
                        board[r][c].element.className = "tile victory-green";
                    }
                }
            }
            endGame(true, "SUCCESS! You flagged all correct letters!");
        } else {
            endGame(false, "Defeated! Your flags missed the target letters.");
        }
    }

    function showMessage(text) {
        messageElement.innerText = text;
        setTimeout(() => {
            if (!gameOver && messageElement.innerText === text) messageElement.innerText = "";
        }, 3000);
    }

    function endGame(won, msg) {
        gameOver = true;
        messageElement.innerText = msg;
        document.getElementById('status-msg').innerText = won ? "YOU WIN! 🎉" : "GAME OVER ❌";
        
        revealWordBox.innerText = `The word is ${SECRET_WORD}`;
        modalOverlay.style.display = "flex";
        
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                let tile = board[r][c];
                if (!tile.isRevealed && !tile.isFlagged) {
                    if (tile.isMine && !won) {
                        tile.element.style.borderColor = "var(--color-mine)";
                    } else if (!tile.isMine) {
                        tile.element.style.opacity = "0.4";
                    }
                }
            }
        }
    }

    initGame();
</script>
